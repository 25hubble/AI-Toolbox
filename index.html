<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Architect · Master Matrix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#eef1f7; --paper-2:#e7ebf3;
    --panel:#ffffff; --panel-2:#f6f8fc; --panel-3:#eef2f8;
    --line:#e4e9f1; --line-2:#d3dbe8;
    --ink:#101a33; --muted:#5b6577; --faint:#8b95a8;
    --accent:#2f5bff; --accent-2:#1e46e0;
    --accent-soft:rgba(47,91,255,.07); --accent-line:rgba(47,91,255,.26);
    --emerald:#0fa968; --emerald-soft:rgba(15,169,104,.09); --emerald-line:rgba(15,169,104,.30);
    --shadow-sm:0 1px 2px rgba(16,26,51,.05);
    --shadow:0 1px 3px rgba(16,26,51,.05),0 14px 34px rgba(16,26,51,.07);
    --shadow-lg:0 2px 6px rgba(16,26,51,.06),0 24px 50px rgba(16,26,51,.10);
    --mono:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --sans:'Archivo',system-ui,-apple-system,sans-serif;
    --r:16px;
  }
  *,*::before,*::after{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; font-family:var(--sans); color:var(--ink); background:var(--paper);
    line-height:1.68; -webkit-font-smoothing:antialiased;
    background-image:
      linear-gradient(rgba(47,91,255,.035) 1px,transparent 1px),
      linear-gradient(90deg,rgba(47,91,255,.035) 1px,transparent 1px),
      radial-gradient(880px 520px at 90% -10%,rgba(47,91,255,.06),transparent 62%),
      radial-gradient(720px 460px at -6% 110%,rgba(15,169,104,.05),transparent 58%);
    background-size:48px 48px,48px 48px,100% 100%,100% 100%;
    min-height:100vh;
  }
  .mono{font-family:var(--mono); letter-spacing:.05em}
  .eyebrow{font-family:var(--mono); font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent)}

  .app{display:grid; grid-template-columns:290px 1fr; min-height:100vh}

  /* ---------------- SIDEBAR ---------------- */
  .rail{
    border-right:1px solid var(--line); background:rgba(255,255,255,.72); backdrop-filter:blur(8px);
    position:sticky; top:0; height:100vh; overflow-y:auto;
    padding:26px 20px 22px; display:flex; flex-direction:column; gap:30px;
  }
  .rail::-webkit-scrollbar{width:6px}
  .rail::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:3px}
  .logo{display:flex; align-items:center; gap:12px; padding-bottom:20px; border-bottom:1px solid var(--line)}
  .logo .mark{
    width:40px; height:40px; border:1.5px solid var(--accent-line); border-radius:10px; position:relative; flex-shrink:0;
    background:radial-gradient(circle at 50% 42%,rgba(47,91,255,.12),transparent 70%);
  }
  .logo .mark::before,.logo .mark::after{content:''; position:absolute; background:var(--accent)}
  .logo .mark::before{left:50%; top:9px; bottom:9px; width:1.5px; transform:translateX(-50%)}
  .logo .mark::after{top:50%; left:9px; right:9px; height:1.5px; transform:translateY(-50%)}
  .logo .txt{display:flex; flex-direction:column; line-height:1.2}
  .logo .name{font-weight:800; font-size:15px; letter-spacing:-.01em}
  .logo .ver{font-family:var(--mono); font-size:10px; color:var(--faint); letter-spacing:.16em; margin-top:3px}

  .nav-h{display:flex; justify-content:space-between; align-items:baseline; margin:0 4px 12px}
  .nav-h .t{font-family:var(--mono); font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint)}
  .nav-h .n{font-family:var(--mono); font-size:10px; color:var(--faint)}
  .nav-item{
    display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:11px; cursor:pointer;
    color:var(--muted); transition:background .18s,color .18s,border-color .18s,box-shadow .18s;
    border:1px solid transparent; margin-bottom:4px;
  }
  .nav-item .code{
    font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.04em; color:var(--faint);
    width:28px; height:24px; display:grid; place-items:center; border:1px solid var(--line-2); border-radius:7px; flex-shrink:0; transition:.18s; background:var(--panel);
  }
  .nav-item .lbl{flex:1; font-size:13px; font-weight:500; line-height:1.3}
  .nav-item .cnt{font-family:var(--mono); font-size:11px; color:var(--faint); font-variant-numeric:tabular-nums}
  .nav-item:hover{background:var(--panel); color:var(--ink); box-shadow:var(--shadow-sm)}
  .nav-item:hover .code{color:var(--muted); border-color:var(--line-2)}
  .nav-item.on{background:var(--accent-soft); color:var(--ink); border-color:var(--accent-line)}
  .nav-item.on .code{background:var(--accent); color:#fff; border-color:var(--accent)}
  .nav-item.on .cnt{color:var(--accent)}
  .nav-item.void{opacity:.42}
  .nav-item.void:hover{background:transparent; cursor:default; box-shadow:none}

  .rail-foot{margin-top:auto; border-top:1px solid var(--line); padding-top:16px; display:flex; flex-direction:column; gap:9px}
  .sig{display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:10.5px; color:var(--muted); letter-spacing:.03em}
  .sig .led{width:7px; height:7px; border-radius:50%; background:var(--emerald); box-shadow:0 0 0 3px var(--emerald-soft); animation:pulse 2.4s ease-in-out infinite}
  .sig.dim{color:var(--faint)} .sig.dim .led{background:var(--faint); box-shadow:none; animation:none}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ---------------- MAIN ---------------- */
  .topbar{
    display:flex; justify-content:space-between; align-items:center; gap:20px; padding:15px 40px;
    border-bottom:1px solid var(--line); background:rgba(238,241,247,.8); backdrop-filter:blur(8px);
    position:sticky; top:0; z-index:5; flex-wrap:wrap;
  }
  .crumb{font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:var(--muted)}
  .crumb b{color:var(--accent)}
  .telemetry{display:flex; gap:22px; align-items:center; font-family:var(--mono); font-size:11px; color:var(--faint)}
  .telemetry .u{color:var(--ink); font-weight:600; font-variant-numeric:tabular-nums}
  .telemetry .live{display:inline-flex; align-items:center; gap:7px; color:var(--emerald)}
  .telemetry .live .led{width:7px; height:7px; border-radius:50%; background:var(--emerald); box-shadow:0 0 0 3px var(--emerald-soft); animation:pulse 2.4s ease-in-out infinite}

  .hero{padding:54px 40px 30px; max-width:1180px}
  .hero .eyebrow{margin-bottom:16px}
  .hero h1{
    font-size:clamp(32px,4.4vw,50px); font-weight:800; letter-spacing:-.03em; line-height:1.02;
    margin:0 0 18px; text-wrap:balance; max-width:920px;
  }
  .hero h1 .accent{
    background:linear-gradient(100deg,var(--accent),#4f7cff 55%,var(--emerald));
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .hero p{color:var(--muted); font-size:15.5px; max-width:640px; margin:0}
  .hero .rule{display:flex; align-items:center; gap:14px; margin-top:28px; color:var(--faint)}
  .hero .rule .ln{flex:1; height:1px; background:linear-gradient(90deg,var(--line-2),transparent)}
  .hero .rule .tag{font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase}

  .body{padding:8px 40px 90px; max-width:1180px}

  .sec-head{display:flex; align-items:center; gap:16px; margin:44px 0 20px}
  .sec-head .code{
    font-family:var(--mono); font-size:11px; font-weight:600; color:var(--accent); border:1px solid var(--accent-line);
    padding:6px 10px; border-radius:8px; letter-spacing:.05em; background:var(--accent-soft);
  }
  .sec-head .meta{display:flex; flex-direction:column; gap:2px}
  .sec-head h2{font-size:16px; font-weight:700; margin:0; letter-spacing:-.01em}
  .sec-head .desc{font-family:var(--mono); font-size:10.5px; color:var(--faint); letter-spacing:.02em}
  .sec-head .ln{flex:1; height:1px; background:var(--line-2)}

  .stack{display:flex; flex-direction:column; gap:24px}

  /* ---------------- PANEL CARD ---------------- */
  .panel{
    position:relative; background:var(--panel); border:1px solid var(--line);
    border-radius:var(--r); padding:30px 32px; box-shadow:var(--shadow); transition:box-shadow .25s,transform .25s;
  }
  .panel:hover{box-shadow:var(--shadow-lg); transform:translateY(-2px)}
  /* crop-mark reticles */
  .panel::before,.panel::after{content:''; position:absolute; width:13px; height:13px; pointer-events:none}
  .panel::before{top:11px; left:11px; border-top:1.5px solid var(--accent-line); border-left:1.5px solid var(--accent-line)}
  .panel::after{bottom:11px; right:11px; border-bottom:1.5px solid var(--accent-line); border-right:1.5px solid var(--accent-line)}
  .p-top{display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:16px}
  .p-id{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:var(--accent); text-transform:uppercase; font-weight:500}
  .ref{
    font-family:var(--mono); font-size:10.5px; color:var(--faint); border:1px solid var(--line-2);
    padding:4px 11px; border-radius:20px; letter-spacing:.04em; white-space:nowrap; background:var(--panel-2);
  }
  .ref b{color:var(--muted); font-weight:500}
  .panel h3{font-size:23px; font-weight:800; letter-spacing:-.025em; line-height:1.26; margin:0 0 12px; text-wrap:balance}
  .panel .sub{color:var(--muted); font-size:14.5px; margin:0 0 18px; max-width:730px}
  .tags{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:20px}
  .tag{font-family:var(--mono); font-size:10.5px; color:var(--muted); background:var(--panel-3); border:1px solid var(--line); padding:4px 10px; border-radius:6px; letter-spacing:.01em}

  .readout{
    display:grid; grid-template-columns:auto 1fr; gap:15px; align-items:start;
    background:var(--emerald-soft); border:1px solid var(--emerald-line); border-radius:12px; padding:16px 19px; margin-bottom:20px;
  }
  .readout .k{font-family:var(--mono); font-size:10px; letter-spacing:.13em; color:var(--emerald); text-transform:uppercase; padding-top:3px; white-space:nowrap; font-weight:600}
  .readout .v{font-size:13.5px; color:#12513a; line-height:1.62}

  /* ---------------- ACCORDION ---------------- */
  details{border:1px solid var(--line-2); border-radius:13px; overflow:hidden; background:var(--panel-2); transition:border-color .25s,box-shadow .25s}
  details[open]{border-color:var(--accent-line); box-shadow:var(--shadow-sm)}
  summary{
    list-style:none; cursor:pointer; padding:16px 20px; display:flex; align-items:center; gap:12px;
    font-family:var(--mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); user-select:none;
  }
  summary::-webkit-details-marker{display:none}
  summary .chev{width:18px; height:18px; flex-shrink:0; border:1px solid var(--accent-line); border-radius:5px; display:grid; place-items:center; transition:.25s; color:var(--accent); background:var(--panel)}
  summary .chev::after{content:'+'; font-size:14px; line-height:1}
  details[open] summary .chev{background:var(--accent); color:#fff; transform:rotate(180deg)}
  details[open] summary .chev::after{content:'\2013'}
  summary .flex{flex:1; color:var(--ink); font-weight:600}
  summary .st{font-size:10px; color:var(--faint); letter-spacing:.08em}
  details[open] summary .st{color:var(--emerald)}
  .brief{padding:4px 20px 24px; animation:reveal .4s ease}
  @keyframes reveal{from{opacity:0; transform:translateY(-8px)}to{opacity:1; transform:none}}

  .box{position:relative; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:22px 24px 22px 26px; margin-top:14px; box-shadow:var(--shadow-sm)}
  .box::before{content:''; position:absolute; left:0; top:18px; bottom:18px; width:3px; border-radius:3px; background:var(--accent)}
  .box.g2::before{background:#4f7cff} .box.g3::before{background:var(--emerald)}
  .box-h{display:flex; align-items:center; gap:11px; margin-bottom:14px}
  .box-h .num{font-family:var(--mono); font-size:11px; font-weight:600; color:var(--faint); border:1px solid var(--line-2); border-radius:6px; padding:2px 8px; letter-spacing:.04em}
  .box-h h4{font-size:15.5px; font-weight:700; margin:0; letter-spacing:-.01em}
  .box p{font-size:13.5px; color:#3b455c; margin:0 0 11px}
  .box h5{font-family:var(--mono); font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--emerald); margin:17px 0 8px; font-weight:600}
  .box ul,.box ol{margin:6px 0 12px; padding-left:19px}
  .box li{font-size:13px; color:#3b455c; margin-bottom:7px}
  .box li::marker{color:var(--faint)}
  .box b{color:var(--ink); font-weight:600}
  .box i{color:var(--muted)}
  .closing{background:var(--accent-soft); border:1px solid var(--accent-line); border-radius:10px; padding:14px 16px; margin-top:14px; font-size:13.5px; color:#1c2a52}

  .matrix-table-wrap{overflow-x:auto; margin:8px 0 12px; border:1px solid var(--line-2); border-radius:10px}
  .matrix-table{border-collapse:collapse; width:100%; min-width:560px; font-size:12.5px}
  .matrix-table th,.matrix-table td{padding:11px 14px; text-align:left; border-bottom:1px solid var(--line); vertical-align:top}
  .matrix-table thead th{font-family:var(--mono); background:var(--panel-3); color:var(--accent); font-weight:500; text-transform:uppercase; letter-spacing:.07em; font-size:10px}
  .matrix-table tbody td{color:#3b455c}
  .matrix-table tbody td:first-child{color:var(--ink)}
  .matrix-table tr:last-child td{border-bottom:none}
  .matrix-table tbody tr:hover td{background:var(--panel-2)}

  .actions{display:flex; gap:11px; margin-top:22px; flex-wrap:wrap; align-items:center}
  .btn{font-family:var(--mono); font-size:12px; letter-spacing:.04em; padding:12px 19px; border-radius:10px; text-decoration:none; display:inline-flex; align-items:center; gap:9px; transition:.2s; border:1px solid transparent; cursor:pointer; font-weight:500}
  .btn-primary{background:var(--accent); color:#fff; box-shadow:0 6px 16px rgba(47,91,255,.25)}
  .btn-primary:hover{background:var(--accent-2); box-shadow:0 10px 24px rgba(47,91,255,.32); transform:translateY(-1px)}
  .btn-meta{color:var(--muted); border-color:var(--line-2); background:var(--panel)}
  .btn-meta .dot{color:var(--faint)}

  .empty{font-family:var(--mono); text-align:center; color:var(--faint); padding:80px 20px; font-size:13px; letter-spacing:.04em}

  a:focus-visible,summary:focus-visible,.nav-item:focus-visible{outline:2px solid var(--accent); outline-offset:3px; border-radius:6px}

  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important; scroll-behavior:auto!important}}
  @media(max-width:880px){
    .app{grid-template-columns:1fr}
    .rail{position:static; height:auto}
    .topbar,.hero,.body{padding-left:22px; padding-right:22px}
    .telemetry{display:none}
  }
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="rail">
    <div class="logo">
      <div class="mark"></div>
      <div class="txt"><span class="name" id="brand">CORE ARCHITECT</span><span class="ver" id="ver">v4.0</span></div>
    </div>
    <div>
      <div class="nav-h"><span class="t">System Navigator</span><span class="n" id="nav-total"></span></div>
      <nav id="nav"></nav>
    </div>
    <div class="rail-foot">
      <div class="sig"><span class="led"></span><span>PIPELINE ONLINE</span></div>
      <div class="sig dim"><span class="led"></span><span>yt-dlp · transcript sync</span></div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="crumb">MATRIX <span style="color:var(--faint)">/</span> <b id="crumb-cat">ALL SYSTEMS</b></div>
      <div class="telemetry">
        <span>MODULES <span class="u" id="tel-count">00</span></span>
        <span>SECTORS <span class="u" id="tel-cats">00</span></span>
        <span class="live"><span class="led"></span>LIVE</span>
        <div class="lang-seg" id="lang-seg" role="group" aria-label="language">
          <button data-l="ko" type="button">KO</button><button data-l="en" type="button">EN</button>
        </div>
      </div>
    </div>

    <header class="hero">
      <div class="eyebrow">Enterprise AI Knowledge Console</div>
      <h1 id="title">AI Master <span class="accent">Architecture Matrix</span></h1>
      <p id="subtitle"></p>
      <div id="fresh" class="fresh"></div>
      <div class="rule"><span class="tag">SELECT SECTOR →</span><span class="ln"></span></div>
    </header>

    <div class="body" id="content"></div>
  </main>
</div>

<style>
  .fresh{font-family:var(--mono); font-size:11.5px; color:var(--muted); margin:10px 0 2px; letter-spacing:.03em; display:flex; align-items:center; gap:7px; flex-wrap:wrap}
  .fresh b{color:var(--ink); font-weight:600}
  .fresh .dot-live{width:8px; height:8px; border-radius:50%; background:var(--emerald); box-shadow:0 0 0 3px var(--emerald-soft); animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1} 50%{opacity:.35}}
  .fresh-new{color:var(--emerald); font-weight:600}
  .fresh-dim{color:var(--faint)}
  .new-badge{display:inline-block; margin-left:8px; font-family:var(--mono); font-size:9px; font-weight:700;
    letter-spacing:.1em; color:#fff; background:var(--emerald); padding:2px 6px; border-radius:5px; vertical-align:middle}
  .lang-seg{display:inline-flex; border:1px solid var(--line-2); border-radius:7px; overflow:hidden; margin-left:4px}
  .lang-seg button{font-family:var(--mono); font-size:10.5px; font-weight:600; letter-spacing:.06em; padding:3px 9px;
    border:0; background:transparent; color:var(--faint); cursor:pointer; transition:.15s}
  .lang-seg button:hover{color:var(--muted)}
  .lang-seg button.on{background:var(--accent); color:#fff}
</style>
<script src="data.js"></script>
<script>
(function(){
  const D = window.DASHBOARD_DATA;
  const $ = s => document.querySelector(s);
  if(!D){ $('#content').innerHTML='<div class="empty">// DATA LINK FAILED — check data.js</div>'; return; }

  // ================= 언어(KO/EN) =================
  let lang = localStorage.getItem('am_lang') || 'ko';
  const UI = {
    ko:{ all:'전체 시스템', brief:'엔터프라이즈 실무 분석서', watch:'▶ 원본 영상 시청',
         empty:'// 이 섹터엔 아직 아카이빙된 모듈이 없습니다', updated:'최근 업데이트',
         newN:n=>`· 새 항목 ${n}건`, noNew:'· 오늘 새 항목 없음' },
    en:{ all:'ALL SYSTEMS', brief:'Enterprise Field Analysis', watch:'▶ Watch original',
         empty:'// No modules archived in this sector yet', updated:'Last updated',
         newN:n=>`· ${n} new`, noNew:'· nothing new today' }
  };
  const t = k => UI[lang][k];
  // 엔트리/카테고리의 현재 언어 값 (en 없으면 ko 로 폴백)
  const pick    = (o,f) => (lang==='en' && o.en && o.en[f]!=null) ? o.en[f] : o[f];
  const pickBox = (e,n) => (lang==='en' && e.en && e.en['box'+n]) ? e.en['box'+n] : e['box'+n];

  $('#brand').textContent = D.meta.brand;
  $('#ver').textContent = D.meta.version;
  $('#title').innerHTML = 'AI Master <span class="accent">Architecture Matrix</span>';
  $('#tel-cats').textContent = String(D.categories.length).padStart(2,'0');
  $('#nav-total').textContent = D.entries.length + ' MOD';

  // ---- 신규성(아침 확인용): addedDate(없으면 refDate) 기준 최근 2일 = NEW ----
  const _today = new Date();
  const daysSince = ds => { if(!ds) return 1e9; const d=new Date(ds+'T00:00:00'); return (_today - d)/864e5; };
  const isNew = e => daysSince(e.addedDate || e.refDate) <= 2;
  function renderStatic(){
    $('#subtitle').textContent = pick(D.meta,'subtitle');
    const dates = D.entries.map(e=>e.addedDate||e.refDate).filter(Boolean).sort();
    const last = dates[dates.length-1] || '—';
    const n = D.entries.filter(isNew).length;
    $('#fresh').innerHTML = `<span class="dot-live"></span> ${t('updated')} <b>${last}</b>`
      + (n ? ` <span class="fresh-new">${t('newN')(n)}</span>` : ` <span class="fresh-dim">${t('noNew')}</span>`);
  }

  const countBy = id => D.entries.filter(e=>e.categoryId===id).length;
  let active = 'all';

  (function(){
    const el=$('#tel-count'), target=D.entries.length; let i=0;
    const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(reduce||target===0){ el.textContent=String(target).padStart(2,'0'); return; }
    const t=setInterval(()=>{ i++; el.textContent=String(i).padStart(2,'0'); if(i>=target)clearInterval(t); },90);
  })();

  const nav = $('#nav');
  function renderNav(){
    let h = item('all','··',t('all'), D.entries.length, active==='all', false);
    D.categories.forEach(c=>{ const n=countBy(c.id); h+=item(c.id,c.code,pick(c,'name'),n,active===c.id,n===0); });
    nav.innerHTML = h;
    nav.querySelectorAll('.nav-item').forEach(el=>{
      if(el.classList.contains('void')) return;
      el.tabIndex=0;
      const go=()=>{ active=el.dataset.id; renderNav(); renderContent(); scrollTo({top:0,behavior:'smooth'}); };
      el.onclick=go;
      el.onkeydown=e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();go();} };
    });
  }
  function item(id,code,lbl,n,on,vd){
    return `<div class="nav-item ${on?'on':''} ${vd?'void':''}" data-id="${id}" role="button">
      <span class="code">${code}</span><span class="lbl">${lbl}</span><span class="cnt">${String(n).padStart(2,'0')}</span></div>`;
  }

  const content = $('#content');
  function renderContent(){
    const cats = active==='all' ? D.categories : D.categories.filter(c=>c.id===active);
    $('#crumb-cat').textContent = active==='all' ? 'ALL SYSTEMS' :
      String(pick((D.categories.find(c=>c.id===active)||{}),'name')||'').toUpperCase();
    let h='', shown=0;
    cats.forEach(c=>{
      const items = D.entries.filter(e=>e.categoryId===c.id);
      if(!items.length) return; shown+=items.length;
      h += `<div class="sec-head"><span class="code">${c.code}</span>
        <div class="meta"><h2>${pick(c,'name')}</h2><span class="desc">${pick(c,'desc')}</span></div><span class="ln"></span></div>
        <div class="stack">${items.map(card).join('')}</div>`;
    });
    content.innerHTML = shown ? h : `<div class="empty">${t('empty')}</div>`;
  }

  function card(e){
    const tags=(e.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    return `<article class="panel">
      <div class="p-top">
        <span class="p-id">${pick(e,'moduleTag')||'MODULE'}</span>
        <span class="ref">REF <b>${e.refDate}</b>${isNew(e)?'<span class="new-badge">NEW</span>':''}</span>
      </div>
      <h3>${pick(e,'title')}</h3>
      <p class="sub">${pick(e,'subtitle')||''}</p>
      <div class="tags">${tags}</div>
      <div class="readout"><span class="k">▸ Key Readout</span><span class="v">${pick(e,'takeaway')||''}</span></div>
      <details>
        <summary><span class="chev"></span><span class="flex">${t('brief')}</span><span class="st">EXPAND ▾</span></summary>
        <div class="brief">${boxN(pickBox(e,1),1)}${boxN(pickBox(e,2),2)}${boxN(pickBox(e,3),3)}</div>
      </details>
      <div class="actions">
        <a class="btn btn-primary" href="${e.videoUrl}" target="_blank" rel="noopener">${t('watch')}</a>
        <span class="btn btn-meta">${e.channel} <span class="dot">·</span> ${e.duration}</span>
      </div>
    </article>`;
  }
  function boxN(b,i){ if(!b) return '';
    return `<div class="box g${i}"><div class="box-h"><span class="num">0${i}</span><h4>${b.title.replace(/^\d+\s*·\s*/,'')}</h4></div>${b.html}</div>`;
  }

  // ---- 언어 토글 ----
  const seg = $('#lang-seg');
  function syncSeg(){ seg.querySelectorAll('button').forEach(b=>b.classList.toggle('on', b.dataset.l===lang)); }
  function renderAll(){ renderStatic(); renderNav(); renderContent(); }
  seg.querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{ if(lang===b.dataset.l) return; lang=b.dataset.l; localStorage.setItem('am_lang',lang); syncSeg(); renderAll(); };
  });
  syncSeg();

  renderAll();
})();
</script>
</body>
</html>
