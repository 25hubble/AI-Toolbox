name: Auto Dashboard Update
on:
  repository_dispatch:
    types: [update-dashboard]
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy New Design and Data
        run: |
          echo '${{ github.event.client_payload.html_content }}' > index.html
          git config --global user.name "AI-Master-Bot"
          git config --global user.email "bot@ai-master.com"
          git add index.html
          git commit -m "🔄 [Auto] 디자인 및 최신 데이터 패치 완료"
          git push
